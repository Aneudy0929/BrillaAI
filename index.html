<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrillaAI</title>
    <link rel="manifest" href="/static/manifest.json">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; 
            color: #e0e0e0; 
            display: flex; flex-direction: column; align-items: center; padding: 40px 20px; 
            min-height: 100vh;
        }
        
        h1 { color: #ffffff; margin-bottom: 20px; letter-spacing: 1px; }

        input { 
            width: 80%; max-width: 600px; padding: 15px; margin-bottom: 15px; 
            background-color: #1e1e1e; border: 1px solid #333; border-radius: 12px; color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        
        button { 
            padding: 12px 30px; cursor: pointer; background-color: #007bff; color: white; 
            border: none; border-radius: 12px; font-weight: bold; transition: background 0.3s;
        }
        button:hover { background-color: #0056b3; }

        #respuesta { 
            margin-top: 30px; width: 80%; max-width: 600px; padding: 20px; 
            background-color: #1e1e1e; border: 1px solid #333; border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.4); line-height: 1.6;
        }

        footer {
            margin-top: auto; /* Empuja el footer al fondo si la pantalla es alta */
            padding: 40px 20px 20px 20px;
            text-align: center;
            color: #666;
            font-size: 0.9em;
            width: 100%;
        }
    </style>
</head>
<body>
    <img src="/static/12e8a6a547e317524121f7a5d6084036.gif" alt="Logo animado" style="width: 150px; height: auto; margin-bottom: 10px;">
    
    <h1>BrillaAI</h1>
    
    <input type="text" id="pregunta" placeholder="Escribe tu consulta..." onkeydown="if(event.key==='Enter') enviarConsulta()">
    <button onclick="enviarConsulta()">Enviar</button>
    
    <div id="respuesta">Esperando tu consulta...</div>

    <script>
        async function enviarConsulta() {
            const pregunta = document.getElementById('pregunta').value;
            const resDiv = document.getElementById('respuesta');
            
            if (!pregunta) {
                alert("Por favor, escribe algo.");
                return;
            }

            resDiv.innerText = "Pensando...";
            
            try {
                const response = await fetch('/consultar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pregunta: pregunta })
                });

                if (!response.ok) throw new Error("Error en el servidor");

                const data = await response.json();
                resDiv.innerText = data.respuesta_final;
            } catch (error) {
                resDiv.innerText = "Hubo un error al conectar con el servidor.";
            }
        }
    </script>
    
    <footer>
        <div style="display: inline-block; text-align: center;">
            <p>&copy; 2026 BrillaAI | Desarrollado por Aneudy Ullola Ullola</p>
            <p>Dios es Bueno</p>
        </div>
    </footer>
</body>
</html>
